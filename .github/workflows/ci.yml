name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14.4"

      - name: Resolve pip cache dir
        id: pip-cache-dir
        run: echo "dir=$(python -m pip cache dir)" >> "$GITHUB_OUTPUT"

      - name: Restore pip cache
        id: backend-pip-cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ steps.pip-cache-dir.outputs.dir }}
          key: pip-${{ runner.os }}-py3.14.0-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-py3.14.0-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --requirement requirements.txt
        working-directory: backend

      - name: Save pip cache (default branch only)
        if: github.ref == 'refs/heads/main' && steps.backend-pip-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ steps.pip-cache-dir.outputs.dir }}
          key: ${{ steps.backend-pip-cache.outputs.cache-primary-key }}

      - name: Run tests with coverage
        run: pytest --cov --cov-report=xml --cov-report=term-missing
        working-directory: backend

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage.xml
          retention-days: 3

  frontend-tests:
    name: Frontend tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24.15.0"

      - name: Resolve npm cache dir
        id: npm-cache-dir
        run: echo "dir=$(npm config get cache)" >> "$GITHUB_OUTPUT"
        working-directory: frontend

      - name: Restore npm cache
        id: frontend-npm-cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ steps.npm-cache-dir.outputs.dir }}
          key: npm-${{ runner.os }}-node24.11.1-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-node24.11.1-

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit
        working-directory: frontend

      - name: Save npm cache (default branch only)
        if: github.ref == 'refs/heads/main' && steps.frontend-npm-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ steps.npm-cache-dir.outputs.dir }}
          key: ${{ steps.frontend-npm-cache.outputs.cache-primary-key }}

      - name: Run tests with coverage
        run: npm test -- --coverage
        working-directory: frontend

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage
          retention-days: 3
