name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  release:
    name: Release & publish image
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write       # needed by semantic-release to create tags/releases
      packages: write       # needed to push to GHCR
      issues: write         # needed by @semantic-release/github to comment on issues
      pull-requests: write  # needed by @semantic-release/github to comment on PRs

    steps:
      - name: Checkout (full history for semantic-release)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run semantic-release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            @semantic-release/changelog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Determine image tags
        id: tags
        run: |
          OWNER="${{ github.repository_owner }}"
          IMAGE="ghcr.io/${OWNER}/cashflow-manager"
          SHA_TAG="${IMAGE}:sha-${{ steps.sha.outputs.short }}"
          if [ "${{ steps.semantic.outputs.new_release_published }}" = "true" ]; then
            VERSION="${{ steps.semantic.outputs.new_release_version }}"
            echo "tags=${SHA_TAG},${IMAGE}:${VERSION},${IMAGE}:latest" >> "$GITHUB_OUTPUT"
          else
            echo "tags=${SHA_TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.description=Personal cashflow manager — FastAPI backend + React frontend
            org.opencontainers.image.licenses=MIT
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/cashflow-manager:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/cashflow-manager:buildcache,mode=min,image-manifest=true,oci-mediatypes=true

      - name: Bump image tag in deploy/docker-compose.yml
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          NEW_VERSION="${{ steps.semantic.outputs.new_release_version }}"
          OWNER="${{ github.repository_owner }}"
          sed -i "s|image: ghcr.io/${OWNER}/cashflow-manager:.*|image: ghcr.io/${OWNER}/cashflow-manager:${NEW_VERSION}|" deploy/docker-compose.yml
          grep -q "ghcr.io/${OWNER}/cashflow-manager:${NEW_VERSION}" deploy/docker-compose.yml \
            || { echo "sed substitution failed — image line not found in deploy/docker-compose.yml"; exit 1; }
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/docker-compose.yml frontend/package.json CHANGELOG.md
          git commit -m "chore(deploy): bump image to v${NEW_VERSION} [skip ci]"
          git push
